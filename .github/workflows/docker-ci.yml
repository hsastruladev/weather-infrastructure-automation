name: Docker Build and Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Prepare Build Context
      # This step creates the placeholder SSL files inside the weather-app folder
      # so that the Docker 'COPY' command doesn't fail.
      run: |
        mkdir -p ./weather-app
        touch ./weather-app/nginx-selfsigned.crt
        touch ./weather-app/nginx-selfsigned.key
        echo "✅ Dummy SSL keys generated for build validation."
        ls -l ./weather-app/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      # Using explicit flags (-f for file, and the path for context)
      run: |
        docker build \
          -t weather-app:test \
          -f ./weather-app/Dockerfile \
          ./weather-app/

    - name: Verify Configuration
      # A quick check to ensure our Nginx config was copied correctly
      run: |
        docker run --rm weather-app:test nginx -t