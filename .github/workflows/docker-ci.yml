name: Docker Build and Scan

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Prepare Build Context
      run: |
        mkdir -p ./weather-app
        echo "-----BEGIN CERTIFICATE-----" > ./weather-app/nginx-selfsigned.crt
        echo "bW9ja2RhdGEK" >> ./weather-app/nginx-selfsigned.crt
        echo "-----END CERTIFICATE-----" >> ./weather-app/nginx-selfsigned.crt
        
        echo "-----BEGIN PRIVATE KEY-----" > ./weather-app/nginx-selfsigned.key
        echo "bW9ja2RhdGEK" >> ./weather-app/nginx-selfsigned.key
        echo "-----END PRIVATE KEY-----" >> ./weather-app/nginx-selfsigned.key
        
        echo "✅ Base64-compliant dummy keys generated."

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        docker build \
          -t weather-app:test \
          -f ./weather-app/Dockerfile \
          ./weather-app/

    - name: Verify Nginx Configuration
      run: |
        docker run --rm weather-app:test nginx -t