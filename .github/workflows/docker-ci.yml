steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Debug and Create Files
      run: |
        # Ensure the directory exists (just in case)
        mkdir -p weather-app
        
        # Create the dummy files
        touch weather-app/nginx-selfsigned.crt
        touch weather-app/nginx-selfsigned.key
        
        echo "--- ROOT DIRECTORY ---"
        ls -F
        echo "--- WEATHER-APP DIRECTORY ---"
        ls -F weather-app/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      run: |
        # We use the relative path to the folder containing the Dockerfile
        docker build -t weather-app:test ./weather-app