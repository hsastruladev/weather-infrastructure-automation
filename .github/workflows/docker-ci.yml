name: Docker Build and Scan

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Dummy SSL for Build
      # This creates the files in the runner's environment so Docker can find them
      run: |
        touch ./weather-app/nginx-selfsigned.crt
        touch ./weather-app/nginx-selfsigned.key

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      run: |
        docker build -t weather-app:test ./weather-app/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image
      run: |
        docker build -t weather-app:test ./weather-app/

    - name: Verify JSON Structure
      run: |
        # This tiny test ensures your JSON is valid before it ever reaches production
        cat ./weather-app/weather.json | jq .